services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: merchstory
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: MerchStoryAPI/Dockerfile
    ports:
      - "5257:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Google__ApiKey=${GOOGLE_API_KEY}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=merchstory;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_SECRET_KEY}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: