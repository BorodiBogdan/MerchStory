services:
  backend:
    build:
      context: ./backend/semantic-kernel-backend
    ports:
      - "5257:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Google__ApiKey=${GOOGLE_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped