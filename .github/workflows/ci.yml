name: CI

on:
  pull_request:
    branches: [master, dev]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    if: github.base_ref != 'master' || github.head_ref == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./backend

      - name: Check formatting (MerchStoryAPI)
        run: dotnet format MerchStoryAPI/MerchStoryAPI.csproj --verify-no-changes
        working-directory: ./backend

      - name: Check formatting (MerchStoryImageGeneration)
        run: dotnet format MerchStoryImageGeneration/MerchStoryImageGeneration.csproj --verify-no-changes
        working-directory: ./backend

      - name: Check formatting (MerchStory.Tests)
        run: dotnet format MerchStory.Tests/MerchStory.Tests.csproj --verify-no-changes
        working-directory: ./backend

      - name: Run tests
        run: dotnet test MerchStory.Tests/MerchStory.Tests.csproj --no-restore --verbosity normal
        working-directory: ./backend

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    if: github.base_ref != 'master' || github.head_ref == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: ESLint
        run: npm run lint
        working-directory: ./frontend

      - name: Prettier check
        run: npm run format:check
        working-directory: ./frontend

      - name: Run tests
        run: npm test
        working-directory: ./frontend

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    if: github.base_ref != 'master' || github.head_ref == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Run Playwright suite
        run: npm run test:e2e
        working-directory: ./frontend

      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
