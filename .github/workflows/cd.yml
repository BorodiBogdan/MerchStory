name: CD

on:
  push:
    branches: [master]

permissions:
  id-token: write # required for OIDC login
  contents: read

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name merchstoryacr

      - name: Build and push image to ACR
        run: |
          docker build \
            -f backend/MerchStoryAPI/Dockerfile \
            -t merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }} \
            ./backend
          docker push merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }}

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name merchstory-api \
            --resource-group merchstory-prod \
            --image merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }}
