name: CD

on:
  push:
    branches: [master]

permissions:
  id-token: write # required for OIDC login
  contents: read

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name merchstoryacr

      - name: Build and push image to ACR
        run: |
          docker build \
            -f backend/MerchStoryAPI/Dockerfile \
            -t merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }} \
            ./backend
          docker push merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }}

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name merchstory-api \
            --resource-group merchstory-prod \
            --image merchstoryacr.azurecr.io/merchstory-api:${{ github.sha }}

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get backend FQDN
        id: api
        run: |
          FQDN=$(az containerapp show -g merchstory-prod -n merchstory-api --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name merchstoryacr

      - name: Build and push frontend image to ACR
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg EXPO_PUBLIC_API_URL=${{ steps.api.outputs.url }} \
            -t merchstoryacr.azurecr.io/merchstory-web:${{ github.sha }} \
            ./frontend
          docker push merchstoryacr.azurecr.io/merchstory-web:${{ github.sha }}

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name merchstory-web \
            --resource-group merchstory-prod \
            --image merchstoryacr.azurecr.io/merchstory-web:${{ github.sha }}
