# Local development overrides — not used in production
# Pins a fixed dev password so you don't need a .env file locally
services:
  db:
    environment:
      POSTGRES_PASSWORD: devpassword

  # Local LaMa inpainting server. First request downloads the LaMa weights
  # (~200MB) and caches them in the named volume below. Reach it from the
  # backend at http://iopaint:8080, or from your host at http://localhost:8080.
  iopaint:
    build:
      context: ./backend/iopaint
    ports:
      - "8080:8080"
    volumes:
      - iopaint_models:/root/.cache
    restart: unless-stopped

  # Azure Blob Storage emulator. Backend uses the well-known dev connection
  # string when Azure:BlobConnectionString is set to "UseDevelopmentStorage=true",
  # otherwise the real cloud account is used.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    restart: unless-stopped

volumes:
  iopaint_models:
  azurite_data:
